<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FundHub — Test Call</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 420px; padding: 24px; }
    h1 { font-size: 24px; color: #fff; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; margin-top: 16px; }
    label:first-child { margin-top: 0; }
    input { width: 100%; padding: 10px 12px; background: #111; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 15px; }
    input:focus { outline: none; border-color: #22c55e; }
    .bureau-group { display: flex; gap: 8px; margin-top: 6px; }
    .bureau-btn { flex: 1; padding: 10px; border: 2px solid #333; border-radius: 8px; background: #111; color: #888; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s; }
    .bureau-btn:hover { border-color: #555; color: #ccc; }
    .bureau-btn.selected { border-color: #22c55e; color: #22c55e; background: #0a1a0a; }
    .bureau-btn.selected.ex { border-color: #a855f7; color: #a855f7; background: #1a0a2a; }
    .bureau-btn.selected.eq { border-color: #ef4444; color: #ef4444; background: #1a0a0a; }
    .bureau-btn.selected.tu { border-color: #3b82f6; color: #3b82f6; background: #0a0a1a; }
    #launchBtn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 24px; background: #22c55e; color: #000; transition: all 0.15s; }
    #launchBtn:hover { background: #16a34a; }
    #launchBtn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .result { margin-top: 16px; padding: 14px; border-radius: 8px; font-size: 14px; line-height: 1.5; display: none; }
    .result.success { display: block; background: #001a00; border: 1px solid #16a34a; color: #4ade80; }
    .result.error { display: block; background: #1a0000; border: 1px solid #dc2626; color: #f87171; }
    .result.loading { display: block; background: #1a1a00; border: 1px solid #a16207; color: #fbbf24; }
    .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Test Call</h1>
    <p class="subtitle">Launch a test inquiry removal call</p>

    <div class="card">
      <label>Bureau</label>
      <div class="bureau-group">
        <div class="bureau-btn ex" data-bureau="EX" onclick="selectBureau(this)">Experian</div>
        <div class="bureau-btn eq" data-bureau="EQ" onclick="selectBureau(this)">Equifax</div>
        <div class="bureau-btn tu" data-bureau="TU" onclick="selectBureau(this)">TransUnion</div>
      </div>

      <label>Your Phone (for transfer)</label>
      <input type="tel" id="phone" placeholder="+1234567890">

      <button id="launchBtn" onclick="launch()">Launch Call</button>

      <div id="result" class="result"></div>
    </div>

    <p class="footer">FundHub Inquiry Removal AI</p>
  </div>

  <script>
    let selectedBureau = null;

    function selectBureau(el) {
      document.querySelectorAll('.bureau-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      selectedBureau = el.dataset.bureau;
    }

    async function launch() {
      const phone = document.getElementById('phone').value.trim();
      const btn = document.getElementById('launchBtn');
      const result = document.getElementById('result');

      if (!selectedBureau) { showResult('error', 'Pick a bureau'); return; }
      if (!phone) { showResult('error', 'Enter your phone number'); return; }

      btn.disabled = true;
      btn.textContent = 'Launching...';
      showResult('loading', 'Calling ' + { EX: 'Experian', EQ: 'Equifax', TU: 'TransUnion' }[selectedBureau] + '...');

      try {
        const resp = await fetch('/api/test-call', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bureau: selectedBureau, phone })
        });
        const data = await resp.json();

        if (data.ok) {
          showResult('success', data.message + '\n\nCall ID: ' + data.call_id);
        } else {
          showResult('error', data.error || 'Something went wrong');
        }
      } catch (err) {
        showResult('error', 'Network error: ' + err.message);
      }

      btn.disabled = false;
      btn.textContent = 'Launch Call';
    }

    function showResult(type, msg) {
      const el = document.getElementById('result');
      el.className = 'result ' + type;
      el.textContent = msg;
    }

    // Enter key submits
    document.addEventListener('keydown', e => { if (e.key === 'Enter') launch(); });
  </script>
</body>
</html>
